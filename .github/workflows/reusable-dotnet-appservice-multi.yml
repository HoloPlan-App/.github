# .github/workflows/reusable-dotnet-appservice-multi.yml
name: Reusable .NET → Azure App Service (multi-region, multi-instance)

on:
  workflow_call:
    inputs:
      project_path:       { required: true, type: string }
      deployment_config:  { required: true, type: string }
      dotnet_version:     { required: false, type: string, default: '9.0.x' }
      node_version:       { required: false, type: string, default: '20' }
      health_path:        { required: false, type: string, default: '/swagger/api/swagger.json' }
    secrets:
      AZURE_TENANT_ID:       { required: true }
      AZURE_SUBSCRIPTION_ID: { required: true }
      AZURE_CLIENT_ID:       { required: true }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

      - name: Restore
        run: dotnet restore "${{ inputs.project_path }}"

      - name: Stamp version and build info
        id: version
        shell: bash
        run: |
          PROJECT_DIR=$(dirname "${{ inputs.project_path }}")
          APPSETTINGS_FILE="$PROJECT_DIR/appsettings.json"

          if [ ! -f "$APPSETTINGS_FILE" ]; then
            echo "❌ appsettings.json not found at $APPSETTINGS_FILE"
            exit 1
          fi

          CURRENT_DATE=$(date +"%y.%m.%d")
          EXISTING_VERSION=$(jq -r '.Application.Version // empty' "$APPSETTINGS_FILE")
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [[ "$EXISTING_VERSION" == "$CURRENT_DATE"* ]]; then
            SUFFIX=$(echo "$EXISTING_VERSION" | sed "s/$CURRENT_DATE//")
            if [ -z "$SUFFIX" ]; then
              NEW_VERSION="${CURRENT_DATE}a"
            else
              NEXT_LETTER=$(echo "$SUFFIX" | tr 'a-y' 'b-z')
              if [ "$NEXT_LETTER" = "$SUFFIX" ]; then
                NEW_VERSION="${CURRENT_DATE}aa"
              else
                NEW_VERSION="${CURRENT_DATE}${NEXT_LETTER}"
              fi
            fi
          else
            NEW_VERSION="${CURRENT_DATE}a"
          fi

          echo "Stamping version: $NEW_VERSION (commit: $SHORT_SHA)"
          jq --arg version "$NEW_VERSION" '.Application.Version = $version' "$APPSETTINGS_FILE" > temp.json && mv temp.json "$APPSETTINGS_FILE"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Publish
        shell: bash
        run: |
          dotnet publish "${{ inputs.project_path }}" -c Release -o out --no-restore

          jq -n \
            --arg sha "${{ github.sha }}" \
            --arg short_sha "${{ steps.version.outputs.short_sha }}" \
            --arg version "${{ steps.version.outputs.version }}" \
            --arg ref "${{ github.ref_name }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{commit: $sha, short_sha: $short_sha, version: $version, branch: $ref, run_id: $run_id, built_at: $timestamp}' \
            > out/build-info.json

          PUBLISHED_VERSION=$(jq -r '.Application.Version' out/appsettings.json)
          if [ "$PUBLISHED_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "❌ Version mismatch in publish output: expected ${{ steps.version.outputs.version }}, got $PUBLISHED_VERSION"
            exit 1
          fi

          echo "✅ Published version $PUBLISHED_VERSION (commit: ${{ steps.version.outputs.short_sha }})"

      - name: Test (non-blocking)
        continue-on-error: true
        run: |
          if compgen -G "**/*Tests*.csproj" > /dev/null; then
            dotnet test -c Release --no-build --verbosity minimal
          else
            echo "No test projects found"
          fi

      - name: Create deployment package
        shell: bash
        run: |
          cd out
          rm -rf _logs 2>/dev/null || true
          zip -r ../deployment.zip .
          cd ..
          echo "✅ deployment.zip: $(du -h deployment.zip | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment.zip
          retention-days: 3

    outputs:
      version: ${{ steps.version.outputs.version }}
      short_sha: ${{ steps.version.outputs.short_sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}

      - name: Deploy to all targets
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.build.outputs.version }}
          HEALTH_PATH: ${{ inputs.health_path }}
        run: |
          OVERALL_FAILED=0

          echo '${{ inputs.deployment_config }}' | jq -c '.[]' | while read region; do
            RESOURCE_GROUP=$(echo $region | jq -r '.rg')
            WEBAPPS_CSV=$(echo $region | jq -r '.apps')

            IFS=';' read -ra APPS <<< "$WEBAPPS_CSV"
            for APP in "${APPS[@]}"; do
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "  Deploying $EXPECTED_VERSION to $APP ($RESOURCE_GROUP)"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              APP_FAILED=0

              # ── 1. Check if this is the first RunFromPackage deployment ──────────
              # If WEBSITE_RUN_FROM_PACKAGE is not already set, this is a transition
              # from file-extraction to zip-mount. We need to clear wwwroot first to
              # avoid a conflict between old extracted files and the new zip mount.
              CURRENT_RFP=$(az webapp config appsettings list \
                --name "$APP" \
                --resource-group "$RESOURCE_GROUP" \
                --query "[?name=='WEBSITE_RUN_FROM_PACKAGE'].value | [0]" \
                -o tsv 2>/dev/null || echo "")

              if [ -z "$CURRENT_RFP" ] || [ "$CURRENT_RFP" = "0" ]; then
                echo "  ⚠️  First RunFromPackage deployment — clearing wwwroot to avoid mount conflict..."
                # Stop first so we can safely clear files
                az webapp stop --name "$APP" --resource-group "$RESOURCE_GROUP"
                sleep 10
                # Clear wwwroot via Kudu REST API
                KUDU_URL="https://${APP}.scm.azurewebsites.net/api/vfs/site/wwwroot/"
                az webapp deployment list-publishing-credentials \
                  --name "$APP" \
                  --resource-group "$RESOURCE_GROUP" \
                  --query "{user:publishingUserName,pass:publishingPassword}" \
                  -o json > /tmp/creds.json 2>/dev/null || true
                KUDU_USER=$(jq -r '.user' /tmp/creds.json 2>/dev/null || echo "")
                KUDU_PASS=$(jq -r '.pass' /tmp/creds.json 2>/dev/null || echo "")
                if [ -n "$KUDU_USER" ] && [ -n "$KUDU_PASS" ]; then
                  curl -s -X DELETE "$KUDU_URL" \
                    -u "${KUDU_USER}:${KUDU_PASS}" \
                    -H "If-Match: *" 2>/dev/null && echo "  ✅ wwwroot cleared" || echo "  ⚠️  Could not clear wwwroot (non-fatal)"
                fi
                # Enable RunFromPackage
                az webapp config appsettings set \
                  --name "$APP" \
                  --resource-group "$RESOURCE_GROUP" \
                  --settings WEBSITE_RUN_FROM_PACKAGE=1 \
                  --output none
                echo "  ✅ WEBSITE_RUN_FROM_PACKAGE=1 set"
              else
                echo "  ✅ RunFromPackage already enabled — stopping app..."
                az webapp stop --name "$APP" --resource-group "$RESOURCE_GROUP"
              fi

              # ── 2. Wait for process to exit ───────────────────────────────────────
              echo "  ⏳ Waiting for worker process to exit..."
              for i in $(seq 1 30); do
                SITE_STATE=$(az webapp show --name "$APP" --resource-group "$RESOURCE_GROUP" --query "state" -o tsv 2>/dev/null || echo "Unknown")
                if [ "$SITE_STATE" = "Stopped" ]; then
                  echo "  ✅ App stopped (attempt $i)"
                  break
                fi
                [ "$i" -eq 30 ] && echo "  ⚠️  Timed out waiting for stop — proceeding"
                sleep 2
              done
              sleep 5

              # ── 3. Deploy ─────────────────────────────────────────────────────────
              echo "  📦 Deploying zip..."
              az webapp deploy \
                --resource-group "$RESOURCE_GROUP" \
                --name "$APP" \
                --src-path "./deployment.zip" \
                --type zip \
                --restart true \
                --async false \
                --timeout 600
              DEPLOY_RESULT=$?

              # ── 4. Start ──────────────────────────────────────────────────────────
              echo "  ▶️  Starting app..."
              az webapp start --name "$APP" --resource-group "$RESOURCE_GROUP"

              if [ $DEPLOY_RESULT -ne 0 ]; then
                echo "  ❌ Deploy command failed for $APP"
                APP_FAILED=1
              fi

              # ── 5. Verify ─────────────────────────────────────────────────────────
              # Poll for up to 10 minutes (60 × 10s). On Basic tier, cold start after
              # a RunFromPackage deploy can take 3-4 minutes.
              if [ $APP_FAILED -eq 0 ]; then
                echo "  🔍 Verifying (expecting version: $EXPECTED_VERSION)..."
                VERIFIED=false
                APP_URL="https://${APP}.azurewebsites.net"

                for i in $(seq 1 60); do
                  HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${APP_URL}${HEALTH_PATH}" 2>/dev/null || echo "000")

                  if [ "$HTTP_CODE" = "200" ]; then
                    LIVE_VERSION=$(curl -s --max-time 10 "${APP_URL}/build-info.json" 2>/dev/null | jq -r '.version // empty' 2>/dev/null || echo "")

                    if [ "$LIVE_VERSION" = "$EXPECTED_VERSION" ]; then
                      echo "  ✅ Verified: serving version $LIVE_VERSION"
                      VERIFIED=true
                      break
                    elif [ -n "$LIVE_VERSION" ]; then
                      echo "  ⏳ Serving $LIVE_VERSION, expected $EXPECTED_VERSION (attempt $i/60)"
                    else
                      # build-info.json not available — accept HTTP 200 after a few attempts
                      if [ "$i" -ge 5 ]; then
                        echo "  ✅ Accepted: HTTP 200 (build-info.json unavailable)"
                        VERIFIED=true
                        break
                      fi
                      echo "  ⏳ HTTP 200 but no build-info.json yet (attempt $i/60)"
                    fi
                  else
                    echo "  ⏳ HTTP $HTTP_CODE (attempt $i/60)..."
                  fi
                  sleep 10
                done

                if [ "$VERIFIED" = false ]; then
                  APP_FAILED=1
                fi
              fi

              # ── 6. Recovery — ensure app is running regardless of outcome ─────────
              # Even if verification failed, make sure the app process is started.
              # A failed verification means the new code may be broken, but it's better
              # to serve a broken response than a 503 from a stopped process.
              if [ $APP_FAILED -ne 0 ]; then
                echo ""
                echo "  ❌ Deployment verification failed for $APP"
                echo "  ♻️  Ensuring app is running (new code may be broken but app will respond)..."
                az webapp start --name "$APP" --resource-group "$RESOURCE_GROUP" 2>/dev/null || true
                az webapp restart --name "$APP" --resource-group "$RESOURCE_GROUP" 2>/dev/null || true
                echo "  ⚠️  App restarted — check logs at https://${APP}.scm.azurewebsites.net/api/logstream"
                OVERALL_FAILED=1
              else
                echo "  ✅ $APP deployed and verified"
              fi
            done

            echo ""
            echo "✅ Completed region: $RESOURCE_GROUP"
          done

          if [ "$OVERALL_FAILED" -ne 0 ]; then
            echo ""
            echo "❌ One or more deployments failed verification — see above for details"
            exit 1
          fi

          echo ""
          echo "🎉 All deployments verified successfully!"

      - name: Create GitHub Deployment Records
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_STATUS: ${{ job.status }}
        run: |
          echo '${{ inputs.deployment_config }}' | jq -c '.[]' | while read region; do
            RESOURCE_GROUP=$(echo $region | jq -r '.rg')
            WEBAPPS_CSV=$(echo $region | jq -r '.apps')

            IFS=';' read -ra APPS <<< "$WEBAPPS_CSV"
            for APP in "${APPS[@]}"; do
              if [[ "$RESOURCE_GROUP" == *"dev"* ]]; then
                ENV_NAME="Dev"
              elif [[ "$RESOURCE_GROUP" == *"prod"* ]] || [[ "$RESOURCE_GROUP" == "MDU" ]]; then
                ENV_NAME="Prod"
              else
                ENV_NAME="$RESOURCE_GROUP"
              fi

              GH_STATE="success"
              GH_DESC="Deployed ${{ needs.build.outputs.version }} to $APP"
              if [ "$DEPLOY_STATUS" != "success" ]; then
                GH_STATE="failure"
                GH_DESC="Deployment of ${{ needs.build.outputs.version }} to $APP failed verification"
              fi

              DEPLOYMENT_ID=$(jq -n \
                --arg ref "${{ github.ref }}" \
                --arg env "$ENV_NAME" \
                --arg desc "$GH_DESC" \
                '{ref: $ref, environment: $env, description: $desc, auto_merge: false, required_contexts: []}' | \
                gh api --method POST \
                  -H "Accept: application/vnd.github+json" \
                  /repos/${{ github.repository }}/deployments \
                  --input - --jq '.id' 2>/dev/null || echo "")

              if [ -n "$DEPLOYMENT_ID" ]; then
                gh api --method POST \
                  -H "Accept: application/vnd.github+json" \
                  /repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses \
                  -f state="$GH_STATE" \
                  -f environment="$ENV_NAME" \
                  -f description="$GH_DESC" \
                  -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
                  2>/dev/null || true
              fi
            done
          done
