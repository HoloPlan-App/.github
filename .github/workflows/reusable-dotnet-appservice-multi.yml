# .github/workflows/reusable-dotnet-appservice-multi.yml
name: Reusable .NET → Azure App Service (multi-region, multi-instance)

on:
  workflow_call:
    inputs:
      project_path:       { required: true, type: string }
      deployment_config:  { required: true, type: string }
      dotnet_version:     { required: false, type: string, default: '9.0.x' }
      health_path:        { required: false, type: string, default: '/swagger/api/swagger.json' }
    secrets:
      AZURE_TENANT_ID:       { required: true }
      AZURE_SUBSCRIPTION_ID: { required: true }
      AZURE_CLIENT_ID:       { required: true }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

      - name: Restore
        run: dotnet restore "${{ inputs.project_path }}"

      - name: Stamp version and build info
        id: version
        shell: bash
        run: |
          PROJECT_DIR=$(dirname "${{ inputs.project_path }}")
          APPSETTINGS_FILE="$PROJECT_DIR/appsettings.json"

          if [ ! -f "$APPSETTINGS_FILE" ]; then
            echo "❌ appsettings.json not found at $APPSETTINGS_FILE"
            exit 1
          fi

          CURRENT_DATE=$(date +"%y.%m.%d")
          EXISTING_VERSION=$(jq -r '.Application.Version // empty' "$APPSETTINGS_FILE")
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [[ "$EXISTING_VERSION" == "$CURRENT_DATE"* ]]; then
            SUFFIX=$(echo "$EXISTING_VERSION" | sed "s/$CURRENT_DATE//")
            if [ -z "$SUFFIX" ]; then
              NEW_VERSION="${CURRENT_DATE}a"
            else
              NEXT_LETTER=$(echo "$SUFFIX" | tr 'a-y' 'b-z')
              if [ "$NEXT_LETTER" = "$SUFFIX" ]; then
                NEW_VERSION="${CURRENT_DATE}aa"
              else
                NEW_VERSION="${CURRENT_DATE}${NEXT_LETTER}"
              fi
            fi
          else
            NEW_VERSION="${CURRENT_DATE}a"
          fi

          echo "Stamping version: $NEW_VERSION (commit: $SHORT_SHA)"
          jq --arg version "$NEW_VERSION" '.Application.Version = $version' "$APPSETTINGS_FILE" > temp.json && mv temp.json "$APPSETTINGS_FILE"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Publish
        shell: bash
        run: |
          # Single publish pass — restore + build + publish in one step.
          # This guarantees the stamped appsettings.json is included because
          # there's no separate build step that could cache stale intermediates.
          dotnet publish "${{ inputs.project_path }}" -c Release -o out --no-restore

          # Embed build metadata so we can always verify what's deployed
          jq -n \
            --arg sha "${{ github.sha }}" \
            --arg short_sha "${{ steps.version.outputs.short_sha }}" \
            --arg version "${{ steps.version.outputs.version }}" \
            --arg ref "${{ github.ref_name }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{commit: $sha, short_sha: $short_sha, version: $version, branch: $ref, run_id: $run_id, built_at: $timestamp}' \
            > out/build-info.json

          echo "📦 Publish output:"
          echo "  Version: ${{ steps.version.outputs.version }}"
          echo "  Commit:  ${{ steps.version.outputs.short_sha }}"
          echo "  appsettings version: $(jq -r '.Application.Version' out/appsettings.json)"

          # Verify the stamped version made it into the output
          PUBLISHED_VERSION=$(jq -r '.Application.Version' out/appsettings.json)
          if [ "$PUBLISHED_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "❌ Version mismatch! Source stamped ${{ steps.version.outputs.version }} but publish output has $PUBLISHED_VERSION"
            exit 1
          fi

      - name: Test (non-blocking)
        continue-on-error: true
        run: |
          if compgen -G "**/*Tests*.csproj" > /dev/null; then
            dotnet test -c Release --no-build --verbosity minimal
          else
            echo "No test projects found"
          fi

      - name: Create deployment package
        shell: bash
        run: |
          cd out

          # Clean up anything that shouldn't be in the package
          rm -rf _logs 2>/dev/null || true

          zip -r ../deployment.zip .
          cd ..

          ZIP_SIZE=$(du -h deployment.zip | cut -f1)
          FILE_COUNT=$(unzip -l deployment.zip | tail -1 | awk '{print $2}')
          echo "✅ deployment.zip: $ZIP_SIZE, $FILE_COUNT files"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment.zip
          retention-days: 3

    outputs:
      version: ${{ steps.version.outputs.version }}
      short_sha: ${{ steps.version.outputs.short_sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}

      - name: Deploy to all targets
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.build.outputs.version }}
          HEALTH_PATH: ${{ inputs.health_path }}
        run: |
          FAILED=0

          echo '${{ inputs.deployment_config }}' | jq -c '.[]' | while read region; do
            RESOURCE_GROUP=$(echo $region | jq -r '.rg')
            WEBAPPS_CSV=$(echo $region | jq -r '.apps')

            IFS=';' read -ra APPS <<< "$WEBAPPS_CSV"
            for APP in "${APPS[@]}"; do
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "  Deploying to $APP ($RESOURCE_GROUP)"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              # 1. Stop the app
              echo "  ⏸️  Stopping app..."
              az webapp stop --name "$APP" --resource-group "$RESOURCE_GROUP"

              # 2. Wait for the worker process to actually die.
              #    az webapp stop returns immediately but the process needs time to exit.
              #    Poll the SCM process API to confirm no workers are running.
              echo "  ⏳ Waiting for worker process to exit..."
              for i in $(seq 1 30); do
                PROCESS_COUNT=$(az webapp list-instances --name "$APP" --resource-group "$RESOURCE_GROUP" --query "length(@)" -o tsv 2>/dev/null || echo "0")
                # Also check via Kudu if the main site process is gone
                SITE_STATE=$(az webapp show --name "$APP" --resource-group "$RESOURCE_GROUP" --query "state" -o tsv 2>/dev/null || echo "Unknown")
                if [ "$SITE_STATE" = "Stopped" ]; then
                  echo "  ✅ App confirmed stopped (attempt $i)"
                  break
                fi
                if [ "$i" -eq 30 ]; then
                  echo "  ⚠️  Timed out waiting for stop — proceeding anyway"
                fi
                sleep 2
              done

              # 3. Extra grace period for file handle release (InProcess hosting)
              sleep 5

              # 4. Deploy using RunFromPackage — this is the most reliable method.
              #    Instead of extracting files into wwwroot (which can fail with locked files),
              #    RunFromPackage mounts the zip as a read-only filesystem. The app runs
              #    directly from the zip. No file locking issues, no partial extractions.
              echo "  📦 Deploying via RunFromPackage..."
              az webapp config appsettings set \
                --name "$APP" \
                --resource-group "$RESOURCE_GROUP" \
                --settings WEBSITE_RUN_FROM_PACKAGE=1 \
                --output none 2>/dev/null || true

              az webapp deploy \
                --resource-group "$RESOURCE_GROUP" \
                --name "$APP" \
                --src-path "./deployment.zip" \
                --type zip \
                --restart true \
                --async false \
                --timeout 600

              DEPLOY_RESULT=$?

              # 5. Start the app
              echo "  ▶️  Starting app..."
              az webapp start --name "$APP" --resource-group "$RESOURCE_GROUP"

              if [ $DEPLOY_RESULT -ne 0 ]; then
                echo "  ❌ Deploy command failed for $APP"
                FAILED=1
                continue
              fi

              # 6. Verify the new version is actually serving.
              #    Poll the health endpoint until we see the expected version or timeout.
              echo "  🔍 Verifying deployment (expecting version: $EXPECTED_VERSION)..."
              VERIFIED=false
              APP_URL="https://${APP}.azurewebsites.net"

              for i in $(seq 1 30); do
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${APP_URL}${HEALTH_PATH}" 2>/dev/null || echo "000")

                if [ "$HTTP_CODE" = "200" ]; then
                  # Try to extract version from build-info.json first
                  LIVE_VERSION=$(curl -s --max-time 10 "${APP_URL}/build-info.json" 2>/dev/null | jq -r '.version // empty' 2>/dev/null || echo "")

                  if [ "$LIVE_VERSION" = "$EXPECTED_VERSION" ]; then
                    echo "  ✅ Verified: $APP is serving version $LIVE_VERSION"
                    VERIFIED=true
                    break
                  elif [ -n "$LIVE_VERSION" ]; then
                    echo "  ⏳ App responding but version is $LIVE_VERSION, expected $EXPECTED_VERSION (attempt $i/30)"
                  else
                    echo "  ⏳ App responding (HTTP $HTTP_CODE) but couldn't read version (attempt $i/30)"
                    # If we can't read build-info.json, accept HTTP 200 after a few attempts
                    if [ "$i" -ge 10 ]; then
                      echo "  ✅ Accepted: $APP is responding with HTTP 200 (build-info.json not available)"
                      VERIFIED=true
                      break
                    fi
                  fi
                else
                  echo "  ⏳ Waiting for app to respond (HTTP $HTTP_CODE, attempt $i/30)..."
                fi
                sleep 10
              done

              if [ "$VERIFIED" = false ]; then
                echo "  ❌ Verification failed for $APP — app did not serve expected version within 5 minutes"
                FAILED=1
              fi
            done

            echo ""
            echo "✅ Completed region: $RESOURCE_GROUP"
          done

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "❌ One or more deployments failed verification"
            exit 1
          fi

          echo ""
          echo "🎉 All deployments verified successfully!"

      - name: Create GitHub Deployment Records
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo '${{ inputs.deployment_config }}' | jq -c '.[]' | while read region; do
            RESOURCE_GROUP=$(echo $region | jq -r '.rg')
            WEBAPPS_CSV=$(echo $region | jq -r '.apps')

            IFS=';' read -ra APPS <<< "$WEBAPPS_CSV"
            for APP in "${APPS[@]}"; do
              if [[ "$RESOURCE_GROUP" == *"dev"* ]]; then
                ENV_NAME="Dev"
              elif [[ "$RESOURCE_GROUP" == *"prod"* ]] || [[ "$RESOURCE_GROUP" == "MDU" ]]; then
                ENV_NAME="Prod"
              else
                ENV_NAME="$RESOURCE_GROUP"
              fi

              DEPLOYMENT_ID=$(jq -n \
                --arg ref "${{ github.ref }}" \
                --arg env "$ENV_NAME" \
                --arg desc "Deploy ${{ needs.build.outputs.version }} (${{ needs.build.outputs.short_sha }}) to $APP" \
                '{ref: $ref, environment: $env, description: $desc, auto_merge: false, required_contexts: []}' | \
                gh api --method POST \
                  -H "Accept: application/vnd.github+json" \
                  /repos/${{ github.repository }}/deployments \
                  --input - --jq '.id' 2>/dev/null || echo "")

              if [ -n "$DEPLOYMENT_ID" ]; then
                gh api --method POST \
                  -H "Accept: application/vnd.github+json" \
                  /repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses \
                  -f state='success' \
                  -f environment="$ENV_NAME" \
                  -f description="Deployed ${{ needs.build.outputs.version }} to $APP" \
                  -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
                  2>/dev/null || true
              fi
            done
          done
