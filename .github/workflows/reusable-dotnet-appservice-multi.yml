# .github/workflows/reusable-dotnet-appservice-multi.yml
name: Reusable .NET → Azure App Service (multi-region, multi-instance)

on:
  workflow_call:
    inputs:
      project_path:       { required: true, type: string }
      deployment_config:  { required: true, type: string }
      dotnet_version:     { required: false, type: string, default: '9.0.x' }
    secrets:
      AZURE_TENANT_ID:       { required: true }
      AZURE_SUBSCRIPTION_ID: { required: true }
      AZURE_CLIENT_ID:       { required: true }

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}
      
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
      
      - name: Restore
        run: dotnet restore "${{ inputs.project_path }}"
      
      - name: Stamp version into appsettings.json (build-time only, not committed)
        shell: bash
        run: |
          PROJECT_DIR=$(dirname "${{ inputs.project_path }}")
          APPSETTINGS_FILE="$PROJECT_DIR/appsettings.json"
          
          if [ ! -f "$APPSETTINGS_FILE" ]; then
            echo "❌ appsettings.json not found"
            exit 1
          fi
          
          CURRENT_DATE=$(date +"%y.%m.%d")
          EXISTING_VERSION=$(jq -r '.Application.Version // empty' "$APPSETTINGS_FILE")
          echo "Current version in source: $EXISTING_VERSION"
          
          if [[ "$EXISTING_VERSION" == "$CURRENT_DATE"* ]]; then
            SUFFIX=$(echo "$EXISTING_VERSION" | sed "s/$CURRENT_DATE//")
            if [ -z "$SUFFIX" ]; then
              NEW_VERSION="${CURRENT_DATE}a"
            else
              NEXT_LETTER=$(echo "$SUFFIX" | tr 'a-y' 'b-z')
              if [ "$NEXT_LETTER" = "$SUFFIX" ]; then
                NEW_VERSION="${CURRENT_DATE}aa"
              else
                NEW_VERSION="${CURRENT_DATE}${NEXT_LETTER}"
              fi
            fi
          else
            NEW_VERSION="${CURRENT_DATE}a"
          fi
          
          echo "Stamping build version: $NEW_VERSION"
          jq --arg version "$NEW_VERSION" '.Application.Version = $version' "$APPSETTINGS_FILE" > temp.json && mv temp.json "$APPSETTINGS_FILE"
          echo "✅ Version stamped (build-time only, not committed to repo)"
      
      - name: Check project configuration
        run: |
          echo "🔍 Checking project file..."
          cat "${{ inputs.project_path }}"
      
      - name: Build
        run: dotnet build "${{ inputs.project_path }}" -c Release --no-restore
      
      - name: Test (non-blocking)
        continue-on-error: true
        run: |
          if compgen -G "**/*Tests*.csproj" > /dev/null; then
            dotnet test -c Release --no-build
          else
            echo "No tests found"
          fi
      
      - name: Publish
        run: |
          mkdir -p out
          dotnet publish "${{ inputs.project_path }}" -c Release -o out
          
          echo "🔍 Checking publish output:"
          test -d out/Pages && echo "✅ Pages directory exists" || echo "❌ Pages directory missing"
          test -d out/wwwroot && echo "✅ wwwroot directory exists" || echo "❌ wwwroot directory missing"
          echo "CSHTML files: $(find out/ -name '*.cshtml' 2>/dev/null | wc -l)"
          find out/ -name "appsettings*.json" 2>/dev/null || echo "No appsettings found"
      
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
      
      - name: Prepare deployment package
        shell: bash
        run: |
          cd out
          
          echo "📦 Creating deployment package..."
          test -d Pages && echo "✅ Pages in package" || echo "❌ Pages missing"
          test -d wwwroot && echo "✅ wwwroot in package" || echo "❌ wwwroot missing"
          
          # Remove _logs if it exists (shouldn't be there but just in case)
          if [ -d "_logs" ]; then
            echo "⚠️ Removing _logs directory from publish output"
            rm -rf _logs
          fi
          
          # Create ZIP
          zip -r ../deployment.zip .
          cd ..
          
          echo "✅ Created deployment.zip ($(du -h deployment.zip | cut -f1))"
      
      - name: Deploy to multiple regions and instances
        shell: bash
        run: |
          echo "Deployment configuration: ${{ inputs.deployment_config }}"
          
          echo '${{ inputs.deployment_config }}' | jq -c '.[]' | while read region; do
            RESOURCE_GROUP=$(echo $region | jq -r '.rg')
            WEBAPPS_CSV=$(echo $region | jq -r '.apps')
            
            echo "🌍 Deploying to region: $RESOURCE_GROUP"
            
            IFS=';' read -ra APPS <<< "$WEBAPPS_CSV"
            for APP in "${APPS[@]}"; do
              echo "  📦 Deploying to $APP..."
              
              # Stop the app first to release file locks
              echo "  ⏸️ Stopping $APP to release file locks..."
              az webapp stop --name "$APP" --resource-group "$RESOURCE_GROUP"
              
              # Use az webapp deploy with clean flag
              echo "  📦 Deploying (this may take a few minutes)..."
              az webapp deploy \
                --resource-group "$RESOURCE_GROUP" \
                --name "$APP" \
                --src-path "./deployment.zip" \
                --type zip \
                --clean true \
                --restart true \
                --async false \
                --timeout 1200
              
              DEPLOY_RESULT=$?
              
              if [ $DEPLOY_RESULT -eq 0 ]; then
                echo "  ✅ Deployed to $APP"
                
                # Ensure app is started
                echo "  ▶️ Ensuring $APP is running..."
                az webapp start --name "$APP" --resource-group "$RESOURCE_GROUP"
                echo "  ✅ App is running"
              else
                echo "  ⚠️ Deployment command failed or timed out"
                echo "  🔍 Checking deployment status via Kudu API..."
                
                # Check if deployment actually succeeded via Kudu
                sleep 10
                KUDU_STATUS=$(curl -s "https://$APP.scm.azurewebsites.net/api/deployments/latest" | jq -r '.status // "unknown"')
                echo "  Kudu deployment status: $KUDU_STATUS"
                
                # Start the app regardless
                echo "  ▶️ Starting $APP..."
                az webapp start --name "$APP" --resource-group "$RESOURCE_GROUP"
                
                if [ "$KUDU_STATUS" = "4" ] || [ "$KUDU_STATUS" = "Success" ]; then
                  echo "  ✅ Deployment actually succeeded (timeout was false alarm)"
                else
                  echo "  ❌ Deployment genuinely failed"
                  exit 1
                fi
              fi
            done
            
            echo "✅ Completed deployment to $RESOURCE_GROUP"
          done
          
          echo "🎉 All deployments completed!"
      
      - name: Create GitHub Deployment Records
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "📝 Creating GitHub deployment records..."
          
          echo '${{ inputs.deployment_config }}' | jq -c '.[]' | while read region; do
            RESOURCE_GROUP=$(echo $region | jq -r '.rg')
            WEBAPPS_CSV=$(echo $region | jq -r '.apps')
            
            IFS=';' read -ra APPS <<< "$WEBAPPS_CSV"
            for APP in "${APPS[@]}"; do
              if [[ "$RESOURCE_GROUP" == *"dev"* ]]; then
                ENV_NAME="Dev"
              elif [[ "$RESOURCE_GROUP" == *"prod"* ]] || [[ "$RESOURCE_GROUP" == "MDU" ]]; then
                ENV_NAME="Prod"
              else
                ENV_NAME="$RESOURCE_GROUP"
              fi
              
              echo "  📝 Creating deployment record for $APP in $ENV_NAME..."
              
              DEPLOYMENT_ID=$(jq -n \
                --arg ref "${{ github.ref }}" \
                --arg env "$ENV_NAME" \
                --arg desc "Deploy to $APP" \
                '{ref: $ref, environment: $env, description: $desc, auto_merge: false, required_contexts: []}' | \
                gh api --method POST \
                  -H "Accept: application/vnd.github+json" \
                  /repos/${{ github.repository }}/deployments \
                  --input - --jq '.id' 2>/dev/null || echo "")
              
              if [ -n "$DEPLOYMENT_ID" ]; then
                echo "  ✅ Created deployment $DEPLOYMENT_ID"
                
                gh api --method POST \
                  -H "Accept: application/vnd.github+json" \
                  /repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses \
                  -f state='success' \
                  -f environment="$ENV_NAME" \
                  -f description="Successfully deployed to $APP" \
                  -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
                  2>/dev/null && echo "  ✅ Marked deployment as successful" || echo "  ⚠️ Failed to update status"
              else
                echo "  ⚠️ Failed to create deployment record (non-blocking)"
              fi
            done
          done
          
          echo "✅ Deployment tracking complete"
